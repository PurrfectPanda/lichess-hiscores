name: Update Lichess Elite Bullet
on:
  schedule:
    - cron: '35 18 * * 0' # Runs 18:35 UTC on Sundays, elite bullet ends at 18:30 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py --type bullet

      - name: Commit and Push
        run: |
          git config --global user.name "Autopanda"
          git config --global user.email "PurrfectPanda@users.noreply.github.com"
          git add data/
          git commit -m "Update bullet high scores" || echo "No changes"
          git push
